version: "3.8"

services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    env_file: ./server/.env
    depends_on:
      - supabase-db

  supabase-db:
    image: supabase/postgres:15.1.0.147
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-data:/var/lib/postgresql/data

volumes:
  supabase-data:
